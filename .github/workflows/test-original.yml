name: Sign and Verify Image with Cosign

on:
  push:
    branches:
      - main

jobs:
  cosign:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # Upstream: https://github.com/sigstore/cosign-installer
      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003

      - name: Verify Cosign installation
        run: cosign version

  crane:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    # Upstream: https://github.com/imjasonh/setup-crane
      - name: Install Crane
        uses: imjasonh/setup-crane@59c71e96a00b28651f10369ba3359a6d730740a0

      - name: Verify Crane installation
        run: crane version
