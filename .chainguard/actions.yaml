# Creating the file is enough to opt in; `enabled` defaults to true.
enabled: true

# Optionally enable automated migration pull requests (defaults to off).
migrate:
  enabled: true
  period: "168h"        # reconcile weekly; clamped to a 1-day minimum
  ignore:
    files:
      - "release.yml"   # leave specific workflow files untouched
      - "*.deprecated.yml"
    actions:
      - "actions/checkout"  # leave specific upstream actions untouched
      - "actions/*"